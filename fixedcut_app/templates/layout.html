<!DOCTYPE html>
<html>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="static/css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <head>
        <title>{% block title%}{% endblock %}</title>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-light bg-light pad">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/">ホーム</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/general">汎用固定カット処理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/senkyo">選挙処理ページ</a>
                </li>
            </ul>
        </nav>

        <h1 class="pad">固定カット処理アプリ</h1>
        <div class="heder pad">
            {% block header %}{% endblock %}
        </div>

        <div class="pad">
            {% block serchbar %}{% endblock %}
        </div>

        <div class="pad">
            {% block content %}{% endblock %}
        </div>
        
        <div class=serch_result>
            {% block serch_result %}{% endblock %}
        </div>
        <div class="footer pad">
            {% block footer %}{% endblock %}
        </div>
        
    </body>
</html>
